<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 218 80">
  <defs>
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#312E81" flood-opacity="0.5"/>
    </filter>
    <clipPath id="leftClip">
      <path d="M 80,32 H 26 Q 12,32 12,46 V 114 Q 12,128 26,128 H 80 Z"/>
    </clipPath>
    <clipPath id="rightClip">
      <path d="M 80,32 H 134 Q 148,32 148,46 V 114 Q 148,128 134,128 H 80 Z"/>
    </clipPath>
  </defs>

  <!-- Icon (logo-icon scaled into a 70x70 area) -->
  <svg x="0" y="5" width="70" height="70" viewBox="0 0 160 160">
    <rect x="12" y="32" width="136" height="96" rx="14" fill="#6366F1" filter="url(#shadow)"/>
    <rect x="12" y="32" width="136" height="96" rx="14" fill="url(#leftGrad)" clip-path="url(#leftClip)"/>
    <rect x="12" y="32" width="136" height="96" rx="14" fill="url(#rightGrad)" clip-path="url(#rightClip)"/>
    <rect x="12" y="32" width="136" height="16" rx="14" fill="white" opacity="0.12"/>
    <rect x="12" y="44" width="136" height="4" fill="white" opacity="0.12"/>
    <line x1="80" y1="35" x2="80" y2="125" stroke="white" stroke-width="1.5" opacity="0.2"/>
    <rect x="19" y="47" width="53" height="13" rx="3" fill="#D4A57A"/>
    <rect x="23" y="50" width="9" height="7" rx="1.5" fill="#E8C99A"/>
    <line x1="26" y1="50" x2="26" y2="57" stroke="#B8895A" stroke-width="0.75"/>
    <rect x="19" y="65" width="53" height="13" rx="3" fill="#C49060"/>
    <rect x="19" y="83" width="53" height="13" rx="3" fill="#B47B48"/>
    <rect x="19" y="101" width="53" height="13" rx="3" fill="#A46830"/>
    <circle cx="118" cy="68" r="18" fill="#B45309"/>
    <circle cx="117" cy="67" r="15" fill="#FCD34D"/>
    <text x="118" y="68" text-anchor="middle" dominant-baseline="central" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="bold" fill="#78350F">€</text>
    <circle cx="107" cy="89" r="13" fill="#B45309"/>
    <circle cx="106" cy="88" r="10.5" fill="#F59E0B"/>
    <text x="107" y="89" text-anchor="middle" dominant-baseline="central" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#78350F">$</text>
    <circle cx="122" cy="104" r="10" fill="#B45309"/>
    <circle cx="121" cy="103" r="8" fill="#FDE68A"/>
    <text x="122" y="104" text-anchor="middle" dominant-baseline="central" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="bold" fill="#78350F">£</text>
  </svg>

  <!-- Text -->
  <text x="82" y="34"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="17" font-weight="300" letter-spacing="2"
        fill="#818CF8">simple</text>
  <text x="80" y="62"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="30" font-weight="700" letter-spacing="-0.5"
        fill="#3730A3">wallet</text>
</svg>
