openapi: 3.0.0

info:
  title: My Simple Wallet API
  version: 1.0.0
  description: REST API for My Simple Wallet

servers:
  - url: http://localhost:3000
    description: Local development

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    TransactionBody:
      type: object
      required: [amount, type, category]
      properties:
        amount:
          type: number
          example: 100
        type:
          type: string
          enum: [income, expense]
          example: income
        category:
          type: string
          example: 64b1f2c3e4d5a6b7c8d9e0f1
        description:
          type: string
          example: Monthly salary
        date:
          type: string
          format: date
          example: 2025-01-15

    RegisterBody:
      type: object
      required: [email, name, password]
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        name:
          type: string
          example: John Doe
        password:
          type: string
          minLength: 6
          example: password123

    LoginBody:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          example: password123

    ForgotPasswordBody:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: john@example.com

    ResetPasswordBody:
      type: object
      required: [password]
      properties:
        password:
          type: string
          minLength: 6
          example: newpassword123

    CategoryBody:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
          minLength: 2
          example: Car Loan
        type:
          type: string
          enum: [income, expense]
          example: expense
        icon:
          type: string
          example: car
        colour:
          type: string
          example: '#FF9800'

security:
  - bearerAuth: []

paths:
  /api/transaction:
    get:
      summary: Get transactions
      description: Returns transactions for the current month by default. Pass `from` and `to` to filter by a custom date range.
      tags: [Transactions]
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date
          description: Start date (e.g. 2025-01-01)
        - in: query
          name: to
          schema:
            type: string
            format: date
          description: End date (e.g. 2025-01-31)
      responses:
        "200":
          description: List of transactions
        "400":
          description: Invalid date format
        "401":
          description: Unauthorized

    post:
      summary: Create a transaction
      tags: [Transactions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionBody"
      responses:
        "201":
          description: Transaction created
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Category not found

  /api/transaction/{id}:
    put:
      summary: Update a transaction
      tags: [Transactions]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Transaction ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionBody"
      responses:
        "200":
          description: Transaction updated
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Transaction not found

    delete:
      summary: Delete a transaction
      tags: [Transactions]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Transaction ID
      responses:
        "200":
          description: Transaction deleted
        "401":
          description: Unauthorized
        "404":
          description: Transaction not found

  /api/category:
    get:
      summary: Get categories
      description: Returns all categories belonging to the current user
      tags: [Categories]
      responses:
        "200":
          description: List of categories
        "401":
          description: Unauthorized

    post:
      summary: Create a category
      tags: [Categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryBody"
      responses:
        "201":
          description: Category created
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /api/category/{id}:
    put:
      summary: Update a category
      tags: [Categories]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Category ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryBody"
      responses:
        "200":
          description: Category updated
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Category not found

    delete:
      summary: Delete a category
      tags: [Categories]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Category ID
      responses:
        "200":
          description: Category deleted
        "401":
          description: Unauthorized
        "404":
          description: Category not found

  /api/auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Registered successfully
        "400":
          description: Validation error
        "409":
          description: Email already in use

  /api/auth/verify-email:
    get:
      summary: Verify email address
      tags: [Auth]
      security: []
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
          description: Verification token sent by email
      responses:
        "200":
          description: Email verified successfully
        "400":
          description: Invalid or missing token

  /api/auth/login:
    post:
      summary: Log in and receive a JWT token
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in successfully
        "401":
          description: Invalid credentials
        "403":
          description: Email not verified

  /api/auth/forgot-password:
    post:
      summary: Request a password reset email
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordBody"
      responses:
        "200":
          description: Reset link sent (same response regardless of whether email exists)
        "400":
          description: Validation error

  /api/auth/reset-password:
    post:
      summary: Reset password using a reset token
      tags: [Auth]
      security: []
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
          description: Password reset token sent by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordBody"
      responses:
        "200":
          description: Password reset successfully
        "400":
          description: Invalid or expired token

  /api/auth/me:
    get:
      summary: Get the current authenticated user
      tags: [Auth]
      responses:
        "200":
          description: Current user data
        "401":
          description: Unauthorized
